#controls h2 { margin-bottom: 0.5em; }
#controls table { border-collapse: collapse; }
#controls td { padding: 2px 6px; }
#controls input, #controls select { font-family: inherit; font-size: 0.9em; padding: 2px 4px; }
.char-card { margin: 0.4em 0; padding: 0 0.5em; background: #fff; border-radius: 4px; }
.char-card summary { cursor: pointer; padding: 0.4em 0; font-weight: bold; }
.char-fields { display: flex; flex-wrap: wrap; gap: 0.3em 0.8em; padding: 0.3em 0 0.5em; }
.char-fields label { display: flex; flex-direction: column; font-size: 0.8em; color: #666; }
.char-fields input, .char-fields select { font-size: 1rem; }
.char-examples { margin: 0.2em 0 0.4em; font-size: 0.85em; color: #555; }
#highlight-bar { position: sticky; top: 0; z-index: 10; padding: 0.4em 1em; background: #f9f9f9; border-bottom: 2px solid #ccc; display: flex; gap: 0.4em; flex-wrap: wrap; align-items: center; }
#highlight-bar button { font-family: inherit; font-size: 0.9em; padding: 0.2em 0.6em; border: 1px solid #aaa; border-radius: 4px; cursor: pointer; background: #fff; }
#highlight-bar select { font-family: inherit; font-size: 0.9em; padding: 0.2em; }
.hide-directions .direction { background-color: transparent !important; }
.hide-directions .brkt { background-color: transparent !important; color: transparent !important; }
</style>

<div class="speech"><span style="grid-column:3"><h2>Notes</h2> All directions should be considered suggestions (including this one). The characters use their actors&apos; preferred names and pronouns. The use of a &apos;/&apos; within a line indicates an interruption point.</span></div>
<br>
<div class="speech"><span style="grid-column:3"><h2>Setting</h2> It is {yearsToSetting} years in the future, following the collapse of the majority of human civilisation. Average global  temperatures are up more than 5 degrees from pre&dash;industrial levels.</span></div>

<h1 class="play">The End of the Summer</h1>
<h2 class="act">Act 1</h2>
<div class="speech"><h3 class="scene" style="grid-column:3">1. Arrival</h3></div>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Present day &mdash; just outside the entrance to the performance space.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">An accelerationist {hn} loiters outside the theatre as the audience arrives. {hS} {hv:holds|hold} a sign saying: &quot;Wake Up Sheeple!&quot; on one side and &quot;Climate Change is a Lie!&quot; on the other. {hS} will actively attempt to engage with audience members entering the theatre by saying these slogans, handing out fliers about &quot;lizard people&quot; / &quot;chemtrails&quot; / &quot;the earth being flat&quot;, and trying to engage them in conversation about the mainstream media being totally silent about the real news, how their mate Sam (&quot;Have you seen Sam?&quot;) was reporting on it getting colder in Libya when they mysteriously disappeared, and how the deep state is manipulating behaviour through subliminal signals in streaming TV services. If anyone tries to respond sensibly to {ho}, {hs} will have answers like &quot;that&apos;s exactly what they want you to think&quot;, &quot;who profits from you believing that?&quot; and &quot;science is just another belief system&quot;. {hS} should come across as an eccentric conspiracy theorist.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><h3 class="scene" style="grid-column:3">2. Pre&dash;pre&dash;meeting</h3></div>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Friday evening, 9th September {setting}, at the Farmhouse. It is hot and dry.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Lights up. The table is laid for a meal. A water container sits on a crate by the front door to the farmhouse.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Enter {dn} with some bowls of vegetables/salad. {dS} {dv:puts|put} them on the table.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">1</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Addressing the audience.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> If you&apos;d asked me in {currentYear} what I&apos;d be doing in {yearsToSetting} years&apos; time, I wouldn&apos;t have foreseen this. I mean, sure, I half&dash;expected to be living off&dash;grid by now. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Makes {dr} comfortable, perhaps sitting</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> On paper it&apos;s quite idyllic; a cosy farmhouse, a picturesque small&dash;holding with a few fields, woodland nearby, and at the end of a hard day of honest work, a small group of reliable folk to share a meal with in the evening sunshine. It&apos;s almost enough to make you forget what&apos;s happened. But this wasn&apos;t a choice, there should still be a dozen little towns and quaint English villages between here and Point Hope.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-d">Do I walk past those ghost towns and deserted villages, travel 40 miles on foot to get to Point Hope? There&apos;s no safety net anymore. No government, no money, no shops. Just bartering between the surviving communities, sparsely dotted across the country. But we have to stay in touch with our neighbours or we&apos;re completely on our own.</span></div>
<br>
<div class="speech"><h3 class="scene" style="grid-column:3">3. Pre&dash;meeting</h3></div>

<br>
<div class="speech"><span class="number">2</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">I don&apos;t like it. It&apos;s too risky.</span></div>
<div class="speech"><span class="number">3</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">It&apos;s the right thing to do, {bn}. They need it, we&apos;ve got it, it&apos;s not far. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{bn} sits and starts to serve {br} with salad, then passes the bowls on to {dn} who does the same.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">4</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">It&apos;s far enough.</span></div>
<div class="speech"><span class="number">5</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">We both went there two years ago. It was safe enough then. You worry too much.</span></div>
<div class="speech"><span class="number">6</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Sighs</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Yes, yes, I know. But only because I love you. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">7</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">It doesn&apos;t have to be me that goes.</span></div>
<div class="speech"><span class="number">8</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">{cn}&apos;s too young, too excitable. And honestly, I&apos;m not sure {an} would come back.</span></div>
<div class="speech"><span class="number">9</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">{aS} {av:does|do} seem a bit off lately.</span></div>
<div class="speech"><span class="number">10</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Yup. But that&apos;s a separate problem. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Sighs</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">11</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">You could go?</span></div>
<div class="speech"><span class="number">12</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">I need to be here.</span></div>
<div class="speech"><span class="number">13</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">We&apos;d manage without you.</span></div>
<div class="speech"><span class="number">14</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Sighs</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> I know. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">15</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">So...?</span></div>
<div class="speech"><span class="number">16</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">So if anyone&apos;s going then it&apos;s you.</span></div>
<div class="speech"><span class="number">17</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">Are you sure?</span></div>
<div class="speech"><span class="number">18</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">I couldn&apos;t bear to leave this place. But it&apos;s good to keep an eye on the neighbourhood, you know. You can see how they&apos;re getting on over there. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">19</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">I could carry more stuff back if I had company.</span></div>
<div class="speech"><span class="number">20</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">We can barely spare one of us right now, Maybe you can recruit someone when you get there. We&apos;ve done well for water the last few months, we should be able to support a couple more.</span></div>
<div class="speech"><span class="number">21</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">If they were the right people.</span></div>
<div class="speech"><span class="number">22</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Well, yes, of course. I trust your judgement on that. Only don&apos;t mention it to the others, I don&apos;t want them getting their hopes up. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Notices {an} &amp; {cn} approaching.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Speaking of which...</span></div>
<br>
<div class="speech"><h3 class="scene" style="grid-column:3">4. Meeting</h3></div>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{an} &amp; {cn} enter and then sit. {dn} passes them the salad bowls.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">23</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">So, are we taking them the satellite terminal or...?</span></div>
<div class="speech"><span class="number">24</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">{dn} thinks we should. I&apos;m not sure yet.</span></div>
<div class="speech"><span class="number">25</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">{fn} sounds like {fs}&apos;d be really grateful. We might be able to haggle for some cool stuff.</span></div>
<div class="speech"><span class="number">26</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">It&apos;s a four day hike there and the same back again.</span></div>
<div class="speech"><span class="number">27</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Oh, I don&apos;t mind.</span></div>
<div class="speech"><span class="number">28</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">It&apos;s risky too, we don&apos;t know who&apos;s out there. If anyone goes they need to travel carefully.</span></div>
<div class="speech"><span class="number">29</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">I can be careful.</span></div>
<div class="speech"><span class="number">30</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Plus we can only spare one person to make the trip.</span></div>
<div class="speech"><span class="number">31</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">I can do / it on my own...</span></div>
<div class="speech"><span class="number">32</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">/ It makes most sense for me to go. I&apos;ve hiked a lot round here and I&apos;ve been there before.</span></div>
<div class="speech"><span class="number">33</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">I&apos;ve travelled too. Only six months ago / if you recall...</span></div>
<div class="speech"><span class="number">34</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">/ No. It needs to be {dn}. {dS} {dv:knows|know} the way, and {dv:knows|know} some of the folk at Point Hope already. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">To {an}</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> {dn} and I took them their last terminal a couple of years ago.</span></div>
<div class="speech"><span class="number">35</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">I&apos;d love to meet them i.r.l. I was chatting to Mo and Henry, Elsie too... a whole bunch of them before they went offline.</span></div>

<div class="speech"><span class="number">37</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">I guess it&apos;s decided then.</span></div>
<div class="speech"><span class="number">38</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Unhappily</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Sounds like it.</span></div>
<div class="speech"><span class="number">39</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Slowly accepting.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Yeah. I suppose it is.</span></div>
<div class="speech"><span class="number">40</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">I&apos;ll head off tomorrow evening then. It&apos;s too late to get packed up today. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">They start to eat.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">41</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">Oh, the bread! <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{dn} goes to leave, {bn} stares at {dn}.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">42</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">To {bn}</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> I&apos;ll be fine.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-d"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{dn} exits. The others start picking at their salad.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">43</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">To {br}</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Right. Fine. Okay.</span></div>
<div class="speech"><span class="number">44</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">I hope {dn} gets us a sweet deal.</span></div>
<div class="speech"><span class="number">45</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">{dS} {dv:knows|know} what {ds}{dv:&apos;s|&apos;re} doing. Look, I&apos;m sorry you don&apos;t get to go.</span></div>
<div class="speech"><span class="number">46</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">A little disappointed.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> It&apos;s okay. {dn}&apos;s the most experienced at this sort of thing. It makes sense.</span></div>
<div class="speech"><span class="number">47</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Yes, but it&apos;s not as exciting staying here is it? Plus, without {dn} around there&apos;ll be extra weeding and kitchen shifts for the rest of us.</span></div>
<div class="speech"><span class="number">48</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">I don&apos;t mind.</span></div>
<div class="speech"><span class="number">49</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Thank you. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Rising to fetch the water, kisses {cn} on the head.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> I don&apos;t know what I&apos;d do without you, {cn}. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">50</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">To {an}</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> It sure would have been nice to get a change of scene.</span></div>
<div class="speech"><span class="number">51</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">You&apos;re telling me.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-a"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Enter {dn} with a loaf of homemade bread. They all eat salad, tear bread and carefully measure out water to drink.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-a"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Lights slowly fade out.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><h3 class="scene" style="grid-column:3">5. Departure</h3></div>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">The evening of Saturday 10th September {setting}. It is hot and dry.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{dn} enters from the farmhouse side, carrying but not wearing a rucksack. {bn} follows closely with a small package in hand, already talking as {bs} {bv:enters|enter}. {an} and {cn} stay some small distance behind. A basket of apples sits on a crate outside the door to the farmhouse. A guitar leans against the crate.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">52</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">...and are you sure you have everything?</span></div>
<div class="speech"><span class="number">53</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">I have plenty, I can&apos;t carry more.</span></div>
<div class="speech"><span class="number">54</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">You&apos;ve got enough water?</span></div>
<div class="speech"><span class="number">55</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">I&apos;ve got enough. I&apos;m sure to find some on the way, too.</span></div>
<div class="speech"><span class="number">56</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">But if you don&apos;t, / do you...</span></div>
<div class="speech"><span class="number">57</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">/ I have enough! I&apos;m crossing the river the day after tomorrow, and then it&apos;s only a couple of days to Point Hope. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Besides, every litre I take is a litre I don&apos;t leave for you.</span></div>
<div class="speech"><span class="number">58</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">But, what if you have to change your route? <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Handing the package to {dn}, who packs it into the rucksack.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">59</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">I&apos;ll be careful. I was careful planning it. There&apos;s enough spare for the odd detour, but I won&apos;t need it &mdash; it&apos;s quieter out there than it was. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">60</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Yeah, I think it is. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Realising this for the first time.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">61</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">You&apos;re not going through the village are you?</span></div>
<div class="speech"><span class="number">62</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">There&apos;s no&dash;one left in the village, but no, I&apos;m going round it.</span></div>
<div class="speech"><span class="number">63</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Did you pack the gun?</span></div>
<div class="speech"><span class="number">64</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">No.</span></div>
<div class="speech"><span class="number">65</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">I thought / we said you would...</span></div>
<div class="speech"><span class="number">66</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">/ You know what I think about the gun. I&apos;ll be safer without it.</span></div>
<div class="speech"><span class="number">67</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Okay.</span></div>
<div class="speech"><span class="number">68</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">And you&apos;ll feel safer with it here. Besides, now you&apos;ve mentioned it, this lot <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Nods or gestures to the audience, but keeps talking to {bn} as if breaking the fourth wall is nothing significant. {bn} looks confused at this and cannot see who {dn} is referring to.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> will want to see what comes of it. Anyway, I&apos;m off. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{dn} puts on the rucksack</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> If all&apos;s well, I&apos;ll be back in 8 days or so.</span></div>
<div class="speech"><span class="number">69</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Message me when you get there.</span></div>
<div class="speech"><span class="number">70</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">As soon as they&apos;ve got the new terminal set up.</span></div>
<div class="speech"><span class="number">71</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Good luck! <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{bn} leans in and kisses {dn} on the cheek, then whispers something in {dn}&apos;s ear. {dn} chuckles sweetly.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">72</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">Goodbye! <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">to all</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">73</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Best of luck!</span></div>
<div class="speech"><span class="number">74</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Rushing over to {dn} and giving them a hug.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Goodbye! See you in 8 days.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-c"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{dn} exits. {bn} looks off after {dn} for a moment. Then turns back to {cn} looking very serious.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">75</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">They&apos;ll come back won&apos;t they?</span></div>
<div class="speech"><span class="number">76</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">I bloody hope so.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-b"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{bn} exits to the back garden.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><h3 class="scene" style="grid-column:3">6. Nando&apos;s</h3></div>
<div class="speech"><span class="number">77</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Oh.</span></div>
<div class="speech"><span class="number">78</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Don&apos;t worry. They&apos;ll come back. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> You know how {bn} feels about them.</span></div>
<div class="speech"><span class="number">79</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">D&apos;you think {bn}&apos;s pissed at me?</span></div>
<div class="speech"><span class="number">80</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">No, they&apos;ll be fine. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat. They sit.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">81</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Of course it&apos;s risky. We don&apos;t really know who&apos;s out there, but {dn}&apos;s pretty solid. {dS}&apos;ll only be gone a few days and then {ds}&apos;ll be back with some sweet loot before you know it.</span></div>
<div class="speech"><span class="number">82</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Yeah, {fn} sounded pretty keen to get back online. Do you think we&apos;ll get a chicken? It would be amazing to have eggs again!</span></div>
<div class="speech"><span class="number">83</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Ha! We&apos;ve barely got enough to feed ourselves. Animals aren&apos;t an efficient way to eat. Even eggs.</span></div>
<div class="speech"><span class="number">84</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Eggs are tasty though. It must have been, like, three years since I had an egg.</span></div>
<div class="speech"><span class="number">85</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">They are tasty. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> How long since you had meat?</span></div>
<div class="speech"><span class="number">86</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Wow. I don&apos;t even know.</span></div>
<div class="speech"><span class="number">87</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">I&apos;d kill for some meat right now.</span></div>
<div class="speech"><span class="number">88</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">You&apos;d have to!</span></div>
<div class="speech"><span class="number">89</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Ha! Yeah, true. I&apos;m not sure I could kill a cow. They are delicious though.</span></div>
<div class="speech"><span class="number">90</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">I&apos;m not sure I ever ate cow. I think I only remember chicken.</span></div>
<div class="speech"><span class="number">91</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Yeah?</span></div>
<div class="speech"><span class="number">92</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Yeah. I remember my Mum taking me to Nando&apos;s in Peterborough as a treat.</span></div>
<div class="speech"><span class="number">93</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Ha. It&apos;ll be underwater now.</span></div>
<div class="speech"><span class="number">94</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Really?</span></div>
<div class="speech"><span class="number">95</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">I crossed The Wash last spring, we landed at Peterborough, well, I say landed...</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-a"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">The lights change. {an} and {cn} jump up onto the table and sit. {cn}&apos;s physicality changes completely, perhaps {cs} {cv:dons|don} a hat from {ca} pocket, as {cs} become The Boatman. {an} is also more animated, at a more agentic moment in their life. They both grab trays off the table and begin to paddle.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">96</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Ah, &apos;ere she is! Full a&apos;ead starboard <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Indicating that {an}, on the right side of the boat, should paddle more. (Can be changed to &apos;port&apos; if the staging comes out the other way around.)</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span>.</span></div>
<div class="speech"><span class="number">97</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Where?</span></div>
<div class="speech"><span class="number">98</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Pointing</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Just there, in the distance. Might catch a glimpse &apos;tween the mist. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Silence as {an} searches.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">99</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Ah, is that a lighthouse sticking out of the water? Shame it&apos;s not lit.</span></div>
<div class="speech"><span class="number">100</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">&apos;at&apos;s the cathedral. Clearest landmark, this part o&apos; the coast. We go south a wee bit, then &apos;ead straight for it.</span></div>
<div class="speech"><span class="number">101</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Why the detour?</span></div>
<div class="speech"><span class="number">102</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Don&apos; wants ta run aground on a block of flats do ya? Gots to follow the course of the river. Can&apos;t see it, mind. Gots to know where it is.</span></div>
<div class="speech"><span class="number">103</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">You&apos;ve landed here before, right?</span></div>
<div class="speech"><span class="number">104</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Dozens o&apos; times. Never in mist like this though...</span></div>
<div class="speech"><span class="number">105</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Er...</span></div>
<div class="speech"><span class="number">106</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">I know the landmarks. I just can&apos;t see &apos;em. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Suddenly surprised by something he sees in the water.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Aah!</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-c"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">A loud crashing sound. {an} and the Boatman leap from the table and land on the ground. {cn} is {cr} again. The lighting reverts and we are back at the farmhouse.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">107</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">So we ended up swimming to the cathedral.</span></div>
<div class="speech"><span class="number">108</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">I wish I could go on an adventure...</span></div>
<div class="speech"><span class="number">109</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Trust me, you&apos;re much safer here.</span></div>
<div class="speech"><span class="number">110</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Yeah, I just wish I could have gone with {dn} to Point Hope. There&apos;s over a hundred of them, you know? And they took in another five refugees just before they went offline.</span></div>
<div class="speech"><span class="number">111</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Even if they can balance all the personalities and keep the peace, they&apos;ll have to be careful with their water supplies. They were already rationing it in July.</span></div>
<div class="speech"><span class="number">112</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">But they are still taking new people.</span></div>
<div class="speech"><span class="number">113</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">{cn}, don&apos;t get your hopes up. We&apos;ve got a good thing going here. If we stay smart, this is survivable. You know what {dn} says, they&apos;re too idealistic down at Point Hope.</span></div>
<div class="speech"><span class="number">114</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Isn&apos;t it good to be optimistic?</span></div>
<div class="speech"><span class="number">115</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">It&apos;s good to be <em>realistic</em>. We&apos;re surviving here because we&apos;re under the radar. No one comes down this end of the valley. {bn} was telling me the spring here has never failed the whole time {ba} family&apos;s lived here,</span></div>
<div class="speech"><span class="number">116</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">That&apos;s what {bs} say. And {ba} family&apos;s been here for, like, 500 years or something.</span></div>
<div class="speech"><span class="number">117</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Right. So as long as that holds up we&apos;re golden.</span></div>
<div class="speech"><span class="number">118</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">I&apos;d still like to see some other people.</span></div>
<div class="speech"><span class="number">119</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Yeah I know. Sorry, I&apos;m not trying to piss on your dreams. But {fn}&apos;s broadcasting their presence every day, They get people turn up hoping for a free meal and a roof over their head every other month. They can&apos;t take them all.</span></div>
<div class="speech"><span class="number">120</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Yeah, I remember what happened last summer.</span></div>
<div class="speech"><span class="number">121</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Yeah, that was tragic. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><h3 class="scene" style="grid-column:3">7. Venting</h3></div>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{bn} enters.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">122</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">To {an}, sounding somewhat annoyed.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Can you check the ventilation control system on the top greenhouse? The vents are stuck open, and the plants are all shrivelling up like raisins.</span></div>
<div class="speech"><span class="number">123</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Eeesh, that&apos;s bad. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Standing to leave.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">124</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">I put some rags over the vents, but I didn&apos;t want to force them closed. It&apos;s cooling off now anyway, but still...</span></div>
<div class="speech"><span class="number">125</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">I&apos;ll override them manually, then see if I can spot why they&apos;re misbehaving.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-a"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{an} exits.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">126</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Are the okra okay?</span></div>
<div class="speech"><span class="number">127</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">The okra are fine. The kale and spinach should pull through too, I don&apos;t think it&apos;s been more than a few hours. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">128</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Sorry about earlier.</span></div>
<div class="speech"><span class="number">129</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">What? Why?</span></div>
<div class="speech"><span class="number">130</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">When {dn} left, you seemed kind of upset.</span></div>
<div class="speech"><span class="number">131</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Oh. Right. Yeah, I&apos;m fine.</span></div>
<div class="speech"><span class="number">132</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Yeah?</span></div>
<div class="speech"><span class="number">133</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Sighs</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">134</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Sorry, you don&apos;t have to talk about it. Though there&apos;s a lot of old posts with people saying that talking about your problems really helps, so...</span></div>
<div class="speech"><span class="number">135</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">People also thought they&apos;d get away with burning all the oil, so not all the old knowledge is good. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Fetching the apples from the crate by the door.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> But look, {dn} and I have known each other for like 6 years. And I kind of met {do} on the rebound from my husband. I&apos;ve not spent much time alone since my early teens. Well, not single anyway. I&apos;m not used to being on my own. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Sits at the table, {cn} does likewise. As they talk, they begin peeling and chopping the apples into another container.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> I know {ds} {dv:knows|know} what {ds}{dv:&apos;s|&apos;re} doing. Like, in my head it&apos;s fine, {ds}&apos;ll be back in 8 days exactly as {ds} said. Even if it doesn&apos;t go to plan, {ds}&apos;ll make it back here.</span></div>
<div class="speech"><span class="number">136</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">We&apos;re lucky to have {do} here.</span></div>
<div class="speech"><span class="number">137</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">That&apos;s very true. {dS}{dv:&apos;s|&apos;re} very devoted. Though I think, in a way, {ds}{dv:&apos;s|&apos;re} lucky to have us too. I don&apos;t know how {dn} would cope without someone to support.</span></div>
<div class="speech"><span class="number">138</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Really?</span></div>
<div class="speech"><span class="number">139</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">That&apos;s another story. But yeah, {ds} just want me, and all of us, to be okay, to have enough, to survive. And I know this. I know what {dS}{dv:&apos;s|&apos;re} like, {da} purpose is us. {dS} {dv:was|were} pretty close to giving up when I met {do}. So yeah, {ds}&apos;ll come back. My head knows this. But my body doesn&apos;t like it. Not at all.</span></div>
<div class="speech"><span class="number">140</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Yeah it&apos;s funny having a body.</span></div>
<div class="speech"><span class="number">141</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Huh. I guess it is.</span></div>
<div class="speech"><span class="number">142</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">I was reading up about these transhumanists the other day. Did you know about them, back in the day? They were planning to upload their minds to the cloud, you know, like, the data cloud &mdash; leave their bodies behind.</span></div>
<div class="speech"><span class="number">143</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Oh there were some properly odd people on the Internet. I expect they&apos;re all gone now. Hard to imagine transhumanists surviving now.</span></div>
<div class="speech"><span class="number">144</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Yeah the last post on the forum was like ten years ago.</span></div>
<div class="speech"><span class="number">145</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Mind you, those of us that have survived probably seemed pretty odd too. People used to look down on survivalists and preppers. No one believed it was coming until it was here &mdash; even then they kept trying the old ways, people in the village were bartering with all sorts of useless crap as the pound collapsed.</span></div>
<div class="speech"><span class="number">146</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Yeah I heard Bitcoin spiked like crazy too. Lots of people became millionaires just before they starved. Did you see it coming?</span></div>
<div class="speech"><span class="number">147</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Me? No. I was as surprised as anyone that it got as bad as it did. But I&apos;ve always lived close to the land. My family&apos;s been on this farm for centuries. As long as the spring keeps up, so will we.</span></div>
<div class="speech"><span class="number">148</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Yeah, as long as we stick together.</span></div>
<div class="speech"><span class="number">149</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Yeah, {dn} will come back.</span></div>
<div class="speech"><span class="number">150</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">I meant you and {an}.</span></div>
<div class="speech"><span class="number">151</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Now ignoring the apples.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Oh God yeah, I don&apos;t know what&apos;s up with {an}. I had really high hopes for {ao} &mdash; {as} {av:was|were} so enthusiastic when {ao} arrived, now it&apos;s like {as} don&apos;t seem to understand the situation here. {aS}{av:&apos;s|&apos;re} happy enough poking at bits of code on {aa} laptop, but when it comes to actually growing what we need to survive {as}&apos;d rather leave it all to me, and {as} just don&apos;t seem grateful at all.</span></div>
<div class="speech"><span class="number">152</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">We&apos;re all working hard, {bn}. And the automation&apos;s really helpful, isn&apos;t it?</span></div>
<div class="speech"><span class="number">153</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Yeah, I know. I know you&apos;re right. Everyone&apos;s pulling their weight, but it seems like {aa} heart isn&apos;t in it anymore. If {as} {av:wants|want} to give up then that&apos;s on {ao}, but I don&apos;t want {ao} dragging the rest of us down.</span></div>
<div class="speech"><span class="number">154</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">{aS}{av:&apos;s|&apos;ve} had a tough time too, I think {aS}{av:&apos;s|&apos;re} just a bit bored of growing vegetables and chopping wood. {aS} said {as} wanted to put on a play.</span></div>
<div class="speech"><span class="number">155</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Ha! ... Ha&dash;ha&dash;ha! ... Ha&dash;ha&dash;ha&dash;ha&dash;ha... Seriously? A Play? Wow, {as} {av:has|have} no idea, {av:does|do} {as}?</span></div>
<div class="speech"><span class="number">156</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Yeah, pretty funny, right? <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> But... is it that crazy?</span></div>
<div class="speech"><span class="number">157</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Standing</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Yes! If {as} {av:wants|want} to prance about and pretend then that&apos;s up to {ao}. And you know what, if it lifts {aa} spirits then I&apos;m all for it &mdash; but I don&apos;t want {ao} making extra warehouse trips for nothing, and we&apos;re absolutely not inviting anyone else over to the farmhouse to be ...involved ...or to watch or anything. We&apos;re keeping a low profile here and that&apos;s not negotiable. If we play this right and stay careful we can survive this. The earth should start to recover soon. Another five or ten years and this will all be getting easier again. You&apos;ll see.</span></div>
<div class="speech"><span class="number">158</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Yeah, I hope so. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">159</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">God, {av:doesn&apos;t|don&apos;t} {as} realise how precarious this is? We&apos;re hanging by a thread here, all of us. If the spring fails, then we can&apos;t water the crops and we starve. If the weather doesn&apos;t do what we expect then the crops fail and we starve. If we get the planting wrong then we get a lower harvest and we starve. If we don&apos;t collect enough firewood then when the winter storms come we&apos;ll freeze to death. If we collect too much firewood, then we thin out the woods too much, it dries out the land and everything dies. We&apos;re on a knife edge here, and they want to put on a play? <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Seeing {an} coming from offstage</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Promise me you won&apos;t let {ao} talk you into anything stupid?</span></div>
<div class="speech"><span class="number">160</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Of course.</span></div>
<br>
<div class="speech"><h3 class="scene" style="grid-column:3">8. Debugging</h3></div>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{an} enters, with a laptop. The laptop is modern by today&apos;s standards but looks well&dash;used. There are stickers and scuff marks on the outside.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">161</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Alright, the vents are shut again in the top greenhouse. I&apos;ll see if I can find out why they were misbehaving.</span></div>
<br>

<div class="speech"><span class="number">173</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Yeah we&apos;ve got a few. That&apos;s just on this network though. Then there&apos;s the ones {dn} and I put down the valley and in the village. We should maybe check them too while we&apos;re here. But first maybe let&apos;s check the temperature and humidity readings on these ones.</span></div>

<div class="speech"><span class="number">180</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">So if that&apos;s all normal, let&apos;s check the humidity... <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">More typing</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> ... a bit of variation, but it looks similar?</span></div>

<div class="speech"><span class="number">192</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Ha. It&apos;s funny. At first I thought we would, {bn} and I. We seemed to see a lot of things eye to eye. Now it feels like {bs} just {bv:assumes|assume} {bs} {bv:knows|know} best about everything. Like, I thought when I arrived that this was an equal setup &mdash; we were all working together.</span></div>

<div class="speech"><span class="number">194</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Honestly? You heard {bo} at the meeting last night. I could just as well have gone to Point Hope as {dn}. {bS} didn&apos;t even let me finish.</span></div>

<div class="speech"><span class="number">196</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">I shouldn&apos;t have to <em>argue</em> to be heard. It felt like {bs}&apos;d already decided who was going before we&apos;d even had the meeting. I&apos;m busy doing what I can to support us, and sure I don&apos;t know much about farming compared to {bn}, I can&apos;t draw up a planting schedule. But I am pulling my weight, aren&apos;t I?</span></div>

<div class="speech"><span class="number">198</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">And I know it&apos;s {ba} farm. But I can&apos;t feel like I&apos;m intruding in {ba} space forever, like, this is my home too now. But I don&apos;t feel free here, every day it&apos;s the same, every day it&apos;s planting and watering and weeding and firewood and I just feel like a robot. I feel like I&apos;m losing myself here.</span></div>

<div class="speech"><span class="number">211</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">I find it really comforting that we still get sunsets, you know? Like we&apos;ve lost so much, but nature is still here for us, still... majestic. Even when you understand the processes, that the clouds are just water in the atmosphere, and the light is just radiation from the fusion of hydrogen in the sun, and the colors are just the interaction of the two, even then it&apos;s still magical to behold.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-a">In fact, it&apos;s even better. Knowing that right now our sun is creating new elements for a new generation of planets to be built from. We&apos;re witness to the birth of huge amounts of helium and oxygen and carbon... and the rest. And it&apos;s all happening eight light&dash;minutes away. The fastest thing in the universe takes eight minutes to get here. Incomprehensibly fast, over an incomprehensible distance. The light we&apos;re seeing now was created when I was down checking the greenhouse vents! And then it arrives and gets scattered through the air.</span></div>

<div class="speech"><span class="number">224</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Standing</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Hug?</span></div>
<div class="speech"><span class="number">225</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Sorry, I&apos;m not trying to be dramatic. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{cn} looks at {an} expectantly. They hug.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">226</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Thanks. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> You know, honestly, maybe it&apos;s for the best? That culture wasn&apos;t serving us. We need to build a new one anyway.</span></div>
<div class="speech"><span class="number">227</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Every community I&apos;ve chatted to online is building their own culture.</span></div>
<div class="speech"><span class="number">228</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Maybe. The situation&apos;s changed, but people are still the same. They can only tolerate dissent when they&apos;re comfortable. And nobody&apos;s comfortable now.</span></div>
<div class="speech"><span class="number">229</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">But surely the communities that survive are going to be the ones that can tolerate dissent. The ones that hear everyone&apos;s voice and then make the best decisions.</span></div>
<div class="speech"><span class="number">230</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">I hope you&apos;re right, {cn}.</span></div>
<div class="speech"><span class="number">231</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">It has to be. Fascism sucks. It doesn&apos;t work. You can&apos;t keep scapegoating away everyone you don&apos;t like &mdash; there aren&apos;t enough spare people for that to work. I reckon we&apos;ll come out of this moment stronger. With a better sense of community.</span></div>
<div class="speech"><span class="number">232</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Survival of the fittest?</span></div>
<div class="speech"><span class="number">233</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">I guess, but not just in a ruthless way. Like, it makes us better in the long run. We care for each other, for community, because we need it to survive. And we need diversity &mdash; of people, of opinions. We need people to question things and be curious. And that&apos;s what we&apos;ve got! All the blind followers died in the cities. They starved outside the town halls waiting for the government to help them, staring at their phones trying to doom scroll until they found the answer, or waiting for their AI girlfriends to save them. What we have now is the quirky people. The preppers. The survivalists. The long&dash;termists. The knowledgeable ones. The ones who learnt things they weren&apos;t taught in school. The ones who take one look at an authority figure and say, &apos;No! I&apos;m not doing that. I&apos;m not just blindly following orders, I&apos;m going to stand up for my own needs.&apos;</span></div>
<div class="speech"><span class="number">234</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">I hope you&apos;re right.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-a"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{bn} enters.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">235</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Right, you two. Stop gawping, come on, we need to make dinner.</span></div>
<div class="speech"><span class="number">236</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Yes, {bn}, right away.</span></div>
<div class="speech"><span class="number">237</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Yes, {bn}.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-a"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{cn} &amp; {an} exit.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-a"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{bn} sees the half processed apples and sighs, picks them up and takes them inside.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
