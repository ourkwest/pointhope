<h2 class="act">Act 2</h2>
<div class="speech"><h3 class="scene" style="grid-column:3">1. Sensors</h3></div>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Wednesday evening, 14th September {setting} &mdash; at the Farmhouse. It is hot and dry.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">An old fashioned revolver sits on the crate by the farmhouse door.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Enter {an} and {cn} as they talk. {an} carries a laptop.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">238</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">...yeah, I couldn&apos;t believe it, they&apos;d written the date &quot;10th September {setting}&quot; straight into the source code, along with a cryptic comment about some MIT study predicting that society would collapse by now.</span></div>
<div class="speech"><span class="number">239</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Wow, that&apos;s kinda prescient.</span></div>
<div class="speech"><span class="number">240</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Yeah, pretty freaky. And that&apos;s why the vent controllers stopped running on Saturday.</span></div>
<div class="speech"><span class="number">241</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Were there any clues in the code about why they&apos;d done that?</span></div>
<div class="speech"><span class="number">242</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Oh I dug through the git log, to see if I could gleen any more. So, the software library was originally going to blow up in 2035, but in 2035 someone updated it to last week.</span></div>
<div class="speech"><span class="number">243</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">They already pushed it back, <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Incredulously</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> but only to this year?</span></div>
<div class="speech"><span class="number">244</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">And get this, right, the library was called &apos;Oliver&apos; which struck me as a pretty odd name for a datetime library. But I dug about a bit online and it turns out there was a poet called Mary Oliver, born on the 10th September, 1935, exactly 100 years before the original end date.</span></div>
<div class="speech"><span class="number">245</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">So the lib was a homage to a poet?</span></div>
<div class="speech"><span class="number">246</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Yeah! Well, bits of it were. Other bits were just a vibe&dash;coded mess from the late 20&apos;s. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Obviously pleased.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> I&apos;ve not had a decent bug to flush out in a while. Oh that reminds me! We never checked the other sensors down the valley and in the village.</span></div>
<div class="speech"><span class="number">247</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Checking their phone</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Hmm, no internet at the moment.</span></div>
<div class="speech"><span class="number">248</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">We must remember to do it though. It&apos;s been a while since I did and it would be nice to know if anyone&apos;s passing through these days.</span></div>
<div class="speech"><span class="number">249</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">We&apos;ve not had anyone for ages.</span></div>
<div class="speech"><span class="number">250</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Three and a half months last time I checked the logs. So yeah, it&apos;s pretty unlikely. But it&apos;s not just for our peace of mind, the audience <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">nods or gestures to audience</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> will want to know if anyone&apos;s coming. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Directly addresses audience</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Ha! You lot love being able to spot the foreshadowing and being one step ahead of us, don&apos;t you? <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">251</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Seeing that {an} has broken the fourth wall and bringing {an} back into the scene.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Could we automate the checks?</span></div>
<div class="speech"><span class="number">252</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Yeah, I&apos;ve been meaning to. Might be a good project for you to learn on actually. In fact, we can start on that without the internet. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">By now sitting, opens laptop, but still focused on conversation.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-a"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{bn} enters with a tray of seedlings and a bucket of earth, unseen by {an}.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">253</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">We can set up a cron job to poll for an internet connection, then ping the sensors if it&apos;s up. Post the results to the Mastodon server, and you&apos;ll pick it straight up on your phone. The hard bit will be... well, the sensors all store a bunch of history, so we&apos;ll need to stash the state locally so we remember our position in the event stream so it doesn&apos;t spam us with old events on restarts.</span></div>
<br>
<div class="speech"><h3 class="scene" style="grid-column:3">2. Seedlings</h3></div>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{bn} looks confused.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">254</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Well that all sounds very...<span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Skeptically</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> useful?</span></div>
<div class="speech"><span class="number">255</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">I think it might be useful to know what&apos;s going on down in the valley, actually.</span></div>
<div class="speech"><span class="number">256</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Right. Well it&apos;s not as useful as having food to eat. So let&apos;s get you potting up these lettuces. I&apos;m sure you know what to do by now.</span></div>
<div class="speech"><span class="number">257</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Yes.</span></div>
<div class="speech"><span class="number">258</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Just try to get on with it &mdash; the longer they&apos;re out of the green house the more water they&apos;ll lose.</span></div>
<div class="speech"><span class="number">259</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Yes. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Slightly impatient.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">260</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">And remember, 50ml of water each.</span></div>
<div class="speech"><span class="number">261</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Yes. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Slightly more impatient.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">262</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Gesturing to a container</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> There should be enough water left in this one.</span></div>
<div class="speech"><span class="number">263</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Okay. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{bn} picks up some plant pots from nearby.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">264</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">These should be about the right size. And please put the earth back in the store when you&apos;re done, there&apos;s a lot of moisture in there too. I know we&apos;re past the worst of it today, but the air&apos;s still plenty dry enough. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat, then talking to no one in particular.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> If we can conserve enough water this year we might be able to try replanting a few more trees in the winter, spread the wood down the valley a bit further and undo some of the damage.</span></div>
<div class="speech"><span class="number">265</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Won&apos;t that make us more visible to raiders?</span></div>
<div class="speech"><span class="number">266</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">That dead wood&apos;s been great cover, but we&apos;ve not seen another soul for six months. I think that phase has passed.</span></div>
<div class="speech"><span class="number">267</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Ha! You sound like {dn}. What &quot;phase&quot; are we in now then?</span></div>
<div class="speech"><span class="number">268</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Surviving, regrowing, rebuilding &mdash; more of the same really, just hopefully without the interruptions. The &quot;dead weight&apos;s&quot; fallen away.</span></div>
<div class="speech"><span class="number">269</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Amused</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Yeah, that&apos;s exactly what {dn} would say. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> You&apos;ve not heard from {do} yet have you?</span></div>
<div class="speech"><span class="number">270</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Nothing yet. Any day now. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">271</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Right, I need to get weeding in the top greenhouse, it&apos;s all popping off in there now the ventilation&apos;s sorted again. You two okay with the lettuces?</span></div>
<div class="speech"><span class="number">272</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Yep.</span></div>
<div class="speech"><span class="number">273</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">...</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-a"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{bn} exits</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">274</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">You&apos;re welcome! <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Sarcastically, not so loud that {bn} will hear.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{cn} makes a small snort of humorous recognition at what {an} has said, then sits and grabs a plant pot and spoon and starts filling the pot.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">275</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Come on, we might as well get on with it.</span></div>
<div class="speech"><span class="number">276</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Sure. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Sullen, like a bad tempered child.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">277</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">It&apos;s not like there&apos;s much else to do.</span></div>
<div class="speech"><span class="number">278</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">If you say so.</span></div>
<div class="speech"><span class="number">279</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Hey, don&apos;t get snarky at me, we&apos;ve got to stick together here.</span></div>
<div class="speech"><span class="number">280</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">...</span></div>
<div class="speech"><span class="number">281</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Come on. You and {bn} used to get along. We don&apos;t have much company here, I&apos;d appreciate it if the vibe wasn&apos;t so hostile.</span></div>
<div class="speech"><span class="number">282</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">... <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">They both get on with potting</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">283</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">What would you rather be doing?</span></div>
<div class="speech"><span class="number">284</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">...</span></div>
<div class="speech"><span class="number">285</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Go on, I&apos;m genuinely asking.</span></div>
<div class="speech"><span class="number">286</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">...</span></div>

<div class="speech"><span class="number">288</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">...</span></div>

<div class="speech"><span class="number">293</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Yeah, like the billionaires used to have in their bunkers.</span></div>
<div class="speech"><span class="number">294</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Ha! What do you know about &quot;billionaires&quot;?</span></div>

<div class="speech"><span class="number">296</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Don&apos;t you go wanting things too badly. That sort of thinking got us into this mess.</span></div>
<div class="speech"><span class="number">297</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">I&apos;m allowed to want things aren&apos;t I? I remember having more than this. Oh, it would be nice to have enough fresh water you could swim in it though.</span></div>
<div class="speech"><span class="number">298</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Oh, yeah, for sure, you can dream... <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{cn} sighs. Silence for a moment</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">299</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Hey, do you think {fn}&apos;s updated his message? Maybe {dn}&apos;s arrived but not got online yet.</span></div>

<div class="speech"><h3 class="scene" style="grid-column:3">3. Warehouses</h3></div>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{cn} gets up and turns the radio on, fiddles with the tuning a bit.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">300</span><span class="label char-f" data-char-key="f">{fn}:&nbsp;</span><span class="line char-f"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Sounding tired and resigned to his fate.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> ...I&apos;ll just re&dash;iterate that we are currently without access to the internet, so if any community nearby is able to spare a satellite terminal, we would be extremely grateful and have food and other supplies we&apos;d be willing to trade.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{cn} recognises this message and is disappointed. {cn} returns to potting seedlings with {an}. {cn} gets a phone out and tries to pot plants one&dash;handed while reading it, {cs} end up putting the phone down but still trying to read it while {cs} pot.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">That&apos;s it for this recorded message. I guess I&apos;ll repeat this hourly until I update it, probably in a day or two. I do a live broadcast at 6pm each day. I&apos;m afraid without an internet connection our website is still down, so for now I&apos;ll leave you with a recording from our podcast...</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">After a moment, jingly podcast intro music plays</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">301</span><span class="label char-f" data-char-key="f">{fn}:&nbsp;</span><span class="line char-f"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Sounding much more upbeat.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Hello and welcome to the Point Hope Podcast, I&apos;m your host {fn}. This is episode 49 and we&apos;re recording this on Sunday 14th August, {setting}. My guest today is {gn}, who&apos;s been instrumental in scouting out the surrounding area, reclaiming what we can from what&apos;s left. So {gn}, firstly, thanks for joining us.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">During this radio segment, {bn} returns. {bn} watches them potting for a moment, then grabs some plant pots, unstacks them and lays them out on the table. {bn} then moves away to fetch a watering can and {an} (unnoticed by {bn}) immediately re&dash;stacks some of the pots to make more space on the table. {bn} wanders to the edge of the stage facing where {dn} left and puts down the watering can. {bS} {bv:is|are} visibly emotional. {cn} gets up and cautiously approaches {bo}. {bn} hears {co} coming and turns, quickly grabbing the watering can and walks back past {cn} and offstage, self&dash;conscious that {bs} {bv:looks|look} upset. {cn} returns to potting. {an} is performatively disinterested.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">At some point while potting, {cn} measures {cr} 100ml of water, and another 100ml for {an} from a separate water container than that for the plants. They both drink their water. {cn} holds the cup up over {ca} mouth for the last drips.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">As soon as the onstage action is complete, and enough time has been bought to finish the potting, {cn} may stop the radio at any point.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">302</span><span class="label char-g" data-char-key="g">{gn}:&nbsp;</span><span class="line char-g">Sure, no problem.</span></div>
<div class="speech"><span class="number">303</span><span class="label char-f" data-char-key="f">{fn}:&nbsp;</span><span class="line char-f">So, what sort of things are you on the lookout for when you find a warehouse?</span></div>
<div class="speech"><span class="number">304</span><span class="label char-g" data-char-key="g">{gn}:&nbsp;</span><span class="line char-g">Well, um, obviously, any, err, bottled liquids are good. But don&apos;t just look for water. Firstly, you probably won&apos;t find it, / but also any...</span></div>
<div class="speech"><span class="number">305</span><span class="label char-f" data-char-key="f">{fn}:&nbsp;</span><span class="line char-f">/ Yeah.</span></div>
<div class="speech"><span class="number">306</span><span class="label char-g" data-char-key="g">{gn}:&nbsp;</span><span class="line char-g">But also any closeable container can be used to store water for the summer months. You&apos;ve got to really be looking ahead. This time of year though you really do want the liquids. What people often miss is that tinned food can contain a lot of water. Obviously, soup is ideal if you can find it, tinned fruit is good too &mdash; it&apos;s healthy and actually mostly water. The more water in your food, the more spare water there is for the plants. Tinned meat is obviously great too, if you can get it. Still quite wet. Drier than fruit, but there&apos;s real demand for protein here, especially from our younger residents. You just have to stop your team eating it all before you get back. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Small chuckle</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">307</span><span class="label char-f" data-char-key="f">{fn}:&nbsp;</span><span class="line char-f">Great advice there {gn}. I know my kids love a bit of protein. Richard goes crazy every time there&apos;s chicken on the menu. And apart from food items, what else should people be looking for?</span></div>
<div class="speech"><span class="number">308</span><span class="label char-g" data-char-key="g">{gn}:&nbsp;</span><span class="line char-g">Ah, well, Isla&apos;s been asking for more plastic sheeting. Good for keeping moisture in.</span></div>
<div class="speech"><span class="number">309</span><span class="label char-f" data-char-key="f">{fn}:&nbsp;</span><span class="line char-f">Ah, yes, and for any new listeners, Isla&apos;s our head farmer here at Point Hope.</span></div>
<div class="speech"><span class="number">310</span><span class="label char-g" data-char-key="g">{gn}:&nbsp;</span><span class="line char-g">Yeah, she&apos;s been asking for anything really to seal up containers. Any translucent panels are good, but unless you get super lucky you might need to improvise. We found a bunch of clear plastic storage boxes on the last warehouse trip and Isla&apos;s team did a great job cutting them up into panels for the new greenhouse. Oh, yeah, and things like gaffer tape, duct tape, even more basic stuff like blu tack or clingfilm can work to seal in moisture, also, tents are useful, plant pots, hose pipes, that sort of thing, but talk to Isla about that if you want more details.</span></div>
<div class="speech"><span class="number">311</span><span class="label char-f" data-char-key="f">{fn}:&nbsp;</span><span class="line char-f">Yes, and we&apos;ll be chatting to Isla on an upcoming episode, so be sure to look out for that. She&apos;s always full of advice on how to get the most out of your farm. And {gn}, do you have any advice to offer on scouting and planning?</span></div>
<div class="speech"><span class="number">312</span><span class="label char-g" data-char-key="g">{gn}:&nbsp;</span><span class="line char-g">Er, sure, well if you can get online there&apos;s still good information out there. The satellite imagery&apos;s mostly pretty old now but warehouses don&apos;t exactly move fast.</span></div>
<div class="speech"><span class="number">313</span><span class="label char-f" data-char-key="f">{fn}:&nbsp;</span><span class="line char-f">Ha&dash;ha! That&apos;s right.</span></div>
<div class="speech"><span class="number">314</span><span class="label char-g" data-char-key="g">{gn}:&nbsp;</span><span class="line char-g">Er, yes, Oh and make sure you take enough water for the return journey, unless you&apos;re sure you&apos;re going to find some when you get there. Obviously travel at night if you can, it&apos;s cooler then and you&apos;ll travel faster and lose a lot less water in the process. Remember you&apos;ll be slower on the way back when you&apos;re loaded up with tinned pineapple and gaffer tape. Also, a lot of warehouses don&apos;t have anything useful in them, so you can save yourself a lot of bother researching them first before you commit five people to a ten day round trip just to come back exhausted and empty&dash;handed. But, there&apos;s some real gems out there. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Small laugh at the memory</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> We had some refugees from the midlands a couple of weeks ago.</span></div>
<div class="speech"><span class="number">315</span><span class="label char-f" data-char-key="f">{fn}:&nbsp;</span><span class="line char-f">Oh yes, nice bunch, they&apos;re settling in well.</span></div>
<div class="speech"><span class="number">316</span><span class="label char-g" data-char-key="g">{gn}:&nbsp;</span><span class="line char-g">Er, yes, really well. Um... Well, they&apos;d hiked over a hundred miles looking for somewhere safe, really solid bunch, only lost one out of the six in their group on the way. Anyway they&apos;d stumbled on a warehouse near Nottingham and went in hoping to find some decent supplies inside. The whole thing was still online, solar panels on the roof. They busted into the control room, and managed to access a terminal, and the way they tell it they were living like kings for a month, robots fetching them tins of peaches and that fancy french pate, whatever it&apos;s called...</span></div>
<div class="speech"><span class="number">317</span><span class="label char-f" data-char-key="f">{fn}:&nbsp;</span><span class="line char-f">Foie Gras, I believe.</span></div>
<div class="speech"><span class="number">318</span><span class="label char-g" data-char-key="g">{gn}:&nbsp;</span><span class="line char-g">Er, yeah, that. Anyway, they&apos;d hit the jackpot, lived there for about a month, but it turned out there wasn&apos;t that much wet food in there and they had to move on.</span></div>
<div class="speech"><span class="number">319</span><span class="label char-f" data-char-key="f">{fn}:&nbsp;</span><span class="line char-f">Sounds like they had a nice time though, we should get one of them on the podcast soon...</span></div>
<div class="speech"><span class="number">320</span><span class="label char-g" data-char-key="g">{gn}:&nbsp;</span><span class="line char-g">Yeah, they had quite an adventure. But the point is, it&apos;s worth going out and looking, &apos;cos you never know what you might find.</span></div>
<br>
<div class="speech"><span class="number">321</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Getting up to turn the radio off.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> We&apos;ve heard this one before.</span></div>
<br>
<div class="speech"><h3 class="scene" style="grid-column:3">4. A Play</h3></div>
<div class="speech"><span class="number">322</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">So, tell me about this play you want to do.</span></div>
<div class="speech"><span class="number">323</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">What do you want to know?</span></div>
<div class="speech"><span class="number">324</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Well, why do you want to do one?</span></div>
<div class="speech"><span class="number">325</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">It&apos;s more interesting than potting lettuces.</span></div>
<div class="speech"><span class="number">326</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Ha&dash;ha! That&apos;s a fair point. We could switch up the rota though, you could spend more time gathering wood or in food prep. {bn}&apos;s always happy to swap things round for people.</span></div>
<div class="speech"><span class="number">327</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">That&apos;s not really the point. I don&apos;t want to do something else practical. I want to do something that we don&apos;t need to do. Like, something we&apos;re only doing for us, and only for now, not another chore so I can still be alive and miserable in six months time.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-a">If we put on a play it would be like a big middle finger to fate. Like, yes, we&apos;re screwed and yes we&apos;ve lost so much but we&apos;re still here. We&apos;re still alive and we&apos;re still human and still doing our crazy human things, still telling stories, still making magic despite it all.</span></div>
<div class="speech"><span class="number">328</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">So what&apos;s stopping us?</span></div>
<div class="speech"><span class="number">329</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Well, we&apos;d need a script, and costumes. And ideally a couple more people.</span></div>
<div class="speech"><span class="number">330</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">There&apos;s four of us here, or there will be when {dn} gets back, isn&apos;t that enough for a play?</span></div>
<div class="speech"><span class="number">331</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">I can&apos;t see {bn} and {dn} being very interested.</span></div>
<div class="speech"><span class="number">332</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Have you asked them?</span></div>
<div class="speech"><span class="number">333</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Oh my God can you imagine? {bn}&apos;s so focused on survival. {bS}{bv:&apos;s|&apos;re} not going to care about a play.</span></div>
<div class="speech"><span class="number">334</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Yeah, {bs} might need a bit of persuading...but {bs}{bv:&apos;s|&apos;re} quite open minded you know.</span></div>
<div class="speech"><span class="number">335</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">{bS} {bv:was|were} when I arrived. Just like the {bn} I&apos;d chatted to online. Better, actually. {bS} seemed really keen to know all about me. Well, {bs} did for the first couple of months, anyway. {bS} kept asking me about Hill Park, where I&apos;d just come from. I think maybe {bs} just wanted to understand what had been going wrong, so {bs} could avoid it here. {bS} barely {bv:seems|seem} to notice me now.</span></div>
<div class="speech"><span class="number">336</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">It&apos;s been a tough summer. Maybe this play&apos;s what we need to cheer us up!</span></div>
<div class="speech"><span class="number">337</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Yeah. Maybe...</span></div>
<div class="speech"><span class="number">338</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">What&apos;s it about then?</span></div>
<div class="speech"><span class="number">339</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Oh... I don&apos;t have a / particular play in mind...</span></div>
<div class="speech"><span class="number">340</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">/ You must have one in mind.</span></div>
<div class="speech"><span class="number">341</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Er... well, there was one I was thinking about, I suppose. You&apos;ll laugh.</span></div>
<div class="speech"><span class="number">342</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Try me.</span></div>
<div class="speech"><span class="number">343</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">It&apos;s about this couple getting married.</span></div>
<div class="speech"><span class="number">344</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Oh yeah?</span></div>
<div class="speech"><span class="number">345</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Yeah, Maria and Callum, except they decide not to in the end.</span></div>
<div class="speech"><span class="number">346</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Oh, okay.</span></div>
<div class="speech"><span class="number">347</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">But it&apos;s not really about the plot, it&apos;s about the characters and the journey they go on to make that decision.</span></div>
<div class="speech"><span class="number">348</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Is that why you like it? The journey?</span></div>
<div class="speech"><span class="number">349</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">I guess so, well that and the comedy, it&apos;s pretty funny.</span></div>

<div class="speech"><span class="number">381</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Suddenly very animated</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> I don&apos;t know! Maybe? Maybe yes? Maybe I would rather go just a little bit hungrier than spend every last ounce of energy I&apos;ve got growing vegetables.</span></div>
<div class="speech"><span class="number">382</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">You&apos;ll have less energy if you&apos;re hungry. We have to keep going {an}. I know it&apos;s tough, it&apos;s / tough for all of us.</span></div>

<div class="speech"><span class="number">415</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Maybe, ...maybe not? I&apos;m not sure we can survive here just the three of us. Not with morale like this anyway. We could pack it in at the farm &mdash; go and join them at Point Hope. They must be having an easier time of it there.</span></div>
<div class="speech"><span class="number">416</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Almost incredulous.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Leave your family&apos;s farm? But it&apos;s lovely. And doesn&apos;t {dn} think we&apos;re better off here.</span></div>
<div class="speech"><span class="number">417</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">{dS} certainly {dv:thinks|think} we&apos;re safer here. If...when {ds} {dv:gets|get} back it&apos;ll be interesting to see what {ds} {dv:has|have} to say. None of us have seen any of that lot in person since we took them their last satellite terminal. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> I used to think I&apos;d never leave this place &mdash; that I&apos;d die here if it came to it. But honestly, I don&apos;t know now.</span></div>
<div class="speech"><span class="number">418</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Let&apos;s hope it doesn&apos;t come to that.</span></div>
<div class="speech"><span class="number">419</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Yeah. Let&apos;s hope. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Raises glass to {cn}, who reciprocates.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">420</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">You want to stay, I want to stay, {dn} is coming back in four or five days, and {an} hasn&apos;t left yet.</span></div>
<div class="speech"><span class="number">421</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Perhaps I should have let {ao} go to Point Hope? {aS} did seem keen.</span></div>
<div class="speech"><span class="number">422</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">You noticed that?</span></div>
<div class="speech"><span class="number">423</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Yeah, but I was worried they wouldn&apos;t come back.</span></div>
<div class="speech"><span class="number">424</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">It&apos;s nice that you still want {ao} here.</span></div>
<div class="speech"><span class="number">425</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Yeah, I do. Or maybe I just don&apos;t want to admit that {as}&apos;d rather not be here, with me.</span></div>
<br>
<div class="speech"><h3 class="scene" style="grid-column:3">6. Apologies</h3></div>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Enter {an}</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">A beat passes then they speak simultaneously.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">426</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">/ Look, I don&apos;t mean to be difficult.</span></div>
<div class="speech"><span class="number">427</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">/ I&apos;m sorry about just now. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat, then simultaneously:</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">428</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">/ I&apos;m sorry if I&apos;m making this harder.</span></div>
<div class="speech"><span class="number">429</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">/ You were right, we need a break. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">430</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Ha!</span></div>
<div class="speech"><span class="number">431</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">...</span></div>
<div class="speech"><span class="number">432</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Look, I&apos;m sorry {bn}. I know you&apos;re under a lot of stress right now, you don&apos;t need me souring the mood. Let&apos;s go weed the beds, yeah?</span></div>
<div class="speech"><span class="number">433</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Yeah?</span></div>
<div class="speech"><span class="number">434</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Yeah. I think I&apos;m just forgetting how bad Hill Park was.</span></div>
<div class="speech"><span class="number">435</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Pouring {an} a full cup of water.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Have a drink first.</span></div>
<div class="speech"><span class="number">436</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Seeing the full cup.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Wow. Okay... <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Takes it.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">437</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Sit with us. Let&apos;s have a proper break, the weeds will still be there in half an hour. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{an} sits.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">438</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">I guess I&apos;m just feeling kind of stagnant, every day&apos;s the same. And I don&apos;t know what it&apos;s for. Like, I don&apos;t know if we survive this. I don&apos;t know if we all <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Meaning humanity</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> survive this. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Becoming emotional.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> But if humanity does, then there&apos;s so much hard&dash;won truth and beauty I want it to carry forward.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-a">And if it doesn&apos;t, I want to spend my last days knowing we had a good run, enjoying the best of what we achieved. If we let go of that, I don&apos;t know who we are anymore. I don&apos;t know if I want to go on.</span></div>
<div class="speech"><span class="number">439</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">We need you here {an}. We need you. And we need you to be okay. So what are we preserving? For you and for humanity...</span></div>
<div class="speech"><span class="number">440</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Aaeeurgh! Everything! If we can. But we can&apos;t. I&apos;ve got so much archived on USB sticks, but all the computers are going to age out soon enough. Unless things are going a hell of a lot better in Taiwan then there just aren&apos;t going to be any functioning computers left in oh, I don&apos;t know, a decade or two. They just aren&apos;t built to last. And if we don&apos;t power up the hard drives and check the data every few years it just rots away. It took us 10,000 years to get from farming to computers. I mean, sure, we know what we&apos;re aiming for this time, but even if we do it in 100 years &mdash; which seems pretty far fetched right now, I mean I don&apos;t even think we&apos;ve hit the bottom yet &mdash; but even if let&apos;s say we do it in 100 years, none of this data&apos;s going to be here by then.</span></div>
<div class="speech"><span class="number">441</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Okay, but humans had culture long before they had computers.</span></div>
<div class="speech"><span class="number">442</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Yes! We had storytelling. Epic poems learnt by heart. Traditional folk songs passed down for generations. Whole plays memorised.</span></div>
<div class="speech"><span class="number">443</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Nursery rhymes?</span></div>
<div class="speech"><span class="number">444</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Exactly! We need that now. We need memorable stories to pass on the knowledge that we think is important. We need songs. I know we have the radio, but that&apos;s not going to last either. We need to build a culture that lasts.</span></div>
<div class="speech"><span class="number">445</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">One that lasts better than the culture we had anyway.</span></div>
<div class="speech"><span class="number">446</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">&quot;the heart, in those days, was small, and hard, and full of meanness.&quot;</span></div>
<div class="speech"><span class="number">447</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">What?</span></div>
<div class="speech"><span class="number">448</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">&quot;the heart, in those days, was small, and hard, and full of meanness.&quot; You mentioned Mary Oliver earlier. That&apos;s a line from one of her poems, about the culture we used to have. I can&apos;t remember the rest of it. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Turns to the audience.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> For legal reasons I can&apos;t remember more than a line or two. Ironic, really. But go look it up. It&apos;s called &apos;Of the Empire&apos; by Mary Oliver.</span></div>
<div class="speech"><span class="number">449</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">We can look it up online, it&apos;s probably still out there. And we&apos;ll learn it by heart!</span></div>
<div class="speech"><span class="number">450</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Amused</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Okay. What else do we need?</span></div>
<div class="speech"><span class="number">451</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">A play! It took millenia from the birth of Greek theatre to modern plays. Plays are so important! Not only are they such brilliant entertainment, not only do they bind people together as a cast and as an audience in a shared emotional experience, but they force us all to accept that other worlds are possible. If a group of people can, just by saying so, be other people, in other places, at other times, and carry a whole crowd along with them <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Possible gesture to audience.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span>, then what else could be true if we all just believed it?</span></div>
<div class="speech"><span class="number">452</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">That sounds like it could be dangerous.</span></div>
<div class="speech"><span class="number">453</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">It is! That&apos;s why dictators used to ban it. Theatre can change people&apos;s minds. Give them experiences they&apos;d never have otherwise.</span></div>
<div class="speech"><span class="number">454</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">It&apos;s impossible to change people&apos;s minds! Have you ever tried?</span></div>
<div class="speech"><span class="number">455</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Oh, it&apos;s hard. And humans really do hate having to think for themselves. But if you get them entertained, in a group setting, get them all laughing along in a communal experience... ah, they love that! And that&apos;s when you can start shifting their ideas. Just a little at a time. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">456</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Is that the purpose of theatre, then? To change people&apos;s minds?</span></div>
<div class="speech"><span class="number">457</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">To change their hearts! It&apos;s about showing people patterns of behaviour, situations they might not have encountered yet. We have so much choice in our lives, so much more agency than anyone ever believes, and yet we mostly just follow the path of least resistance. That&apos;s what makes this whole situation so tragic! We had a choice, but still, somehow, we ended up here. We need people to make more deliberate choices, to use their power!</span></div>
<div class="speech"><span class="number">458</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">You really believe in this stuff.</span></div>
<div class="speech"><span class="number">459</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Did you ever go to the theatre?</span></div>
<div class="speech"><span class="number">460</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Oh yes. I wasn&apos;t a complete cultural hermit, down here on my farm. I had a great aunt who used to tell stories about the theatre the whole time. Auntie Katharine. She moved over from Russia and married my great uncle. She brought the gun in fact. She said they used it as a prop in the theatre over there. Apparently it used to belong to this famous playwright she was always going on about. Anton Somebody.</span></div>
<div class="speech"><span class="number">461</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Chekhov?</span></div>
<div class="speech"><span class="number">462</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Yes! That was it.</span></div>
<div class="speech"><span class="number">463</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">We have Chekhov&apos;s gun? <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Possible glance at audience.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">464</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Yeah. It&apos;s a right pain to load though. The shotgun was so much better when we still had shells for it. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Sighs.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Looked more intimidating to intruders as well, plus you didn&apos;t have to be so accurate.</span></div>
<div class="speech"><span class="number">465</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Did you have to intimidate a lot of intruders?</span></div>
<div class="speech"><span class="number">466</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Enough...</span></div>
<div class="speech"><span class="number">467</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">We ran out of shells. Well, it was mostly {dn}. We had one or two hairy moments, but it&apos;s been pretty quiet this end of the valley, thank god.</span></div>
<div class="speech"><span class="number">468</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Can I see it?</span></div>
<div class="speech"><span class="number">469</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Fetching the gun from the crate by the door.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Oh, <em>now</em> you&apos;re interested in firearms, now it belonged to a famous playwright?</span></div>
<div class="speech"><span class="number">470</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Cheekily</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Maybe...?</span></div>
<div class="speech"><span class="number">471</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Amused</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> Yeah, be careful though, I keep it loaded. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Hands it to {an}, who is clearly unfamiliar with guns and somewhat frightened by this last remark.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> And don&apos;t go waving it at strangers if any do show up. Far easier to establish trust if you don&apos;t go waving a gun in people&apos;s faces.</span></div>
<div class="speech"><span class="number">472</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Oh of course. It&apos;s a last resort. I&apos;d never want to use it. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Puts it down gingerly.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">473</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">I&apos;ll put it back <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Returns gun to the crate.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Beat</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">474</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">So, besides plays, I&apos;m guessing some songs would be good?</span></div>
<div class="speech"><span class="number">475</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Oh yes! I&apos;m not much good at songs though. But really anything that can tell a story &mdash; and help people to remember it &mdash; is going to be essential!</span></div>
<div class="speech"><span class="number">476</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">I&apos;ll go get the guitar...</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-c"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Exit {cn}</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><h3 class="scene" style="grid-column:3">7.  Making up</h3></div>
<div class="speech"><span class="number">477</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Thanks for the water.</span></div>

<div class="speech"><span class="number">491</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Aaaaaaanyway, I thought maybe we&apos;d come up with a song.</span></div>

<div class="speech"><span></span><span></span><span class="line char-b"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{cn} starts to improvise on the guitar...</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">494</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">If you don&apos;t know what to do, then tell a story.<br>They&apos;re the wisdom of the folks that came before you.<br>If you can&apos;t find a true one<br>You&apos;ll have to write a new one,<br>Then share it with your friends and family.<br><br><br>A story&apos;s how we understand the world;<br>How you know if you&apos;re a boy or you&apos;re a girl<br>Or if you&apos;re something else<br>Rewrite the story of yourself<br>Until it fits you, and your friends and family.<br><br><br>For we must tell our stories with our friends<br>We must share our wisdom with them or it ends.<br>Create yourself in relation<br>To your friends, it&apos;s such elation<br>To share yourself with friends and family<br><br></span></div>

<div class="speech"><span class="number">496</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">What {dv:does|do} {ds} say? <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{bn} presses play on a voice note. &quot;Ping!&quot;</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">497</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">Right, I&apos;ve made it to Point Hope. Didn&apos;t see a soul on the way. Been here a couple of hours now, and they&apos;ve just got back online. They were pretty pleased to get the terminal, I can tell you. I think they were happy to see me too. Well, {fn} certainly was. We haven&apos;t finished negotiating yet, but you&apos;d be pretty pleased with what&apos;s on the table. I&apos;ll let you know how it goes. I&apos;ll be kipping the night here, but I&apos;m not feeling too shabby after the walk so I won&apos;t stay more than I have to. I&apos;ll be glad to be back in our bed four days hence. Speak soon. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Another &quot;Ping!&quot;</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">498</span><span class="label char-d" data-char-key="d">{dn}:&nbsp;</span><span class="line char-d">Me again. I&apos;ve been chatting with the group here and there&apos;s a couple of pretty capable folk itching for a change of scene. I&apos;ve said we could take them on a trial basis; three months. And they can help me carry the supplies, the seeds, cuttings, oh, and the chickens. Ha&dash;ha! Yes! Tell me what {cn}&apos;s face looks like when they hear about that. Anyway, I&apos;d best go and make good use of my time here, I&apos;ll let you know when I&apos;m leaving, and I should be home by Monday.</span></div>
<div class="speech"><span class="number">499</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Oh my god, chickens! I can&apos;t wait to eat an egg. And people! New people to talk to! Aaaaah, it&apos;s so exciting!</span></div>
<div class="speech"><span class="number">500</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Have we got enough water for two more people?</span></div>
<div class="speech"><span class="number">501</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">{dn} and I talked about this before {ds} left. We knew it might come up. We&apos;re ahead on the rationing and the rains should be here soon.</span></div>
<div class="speech"><span class="number">502</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Wow. Okay.</span></div>
<div class="speech"><span class="number">503</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Everything&apos;s coming up Millwall!</span></div>

<div class="speech"><span class="number">505</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">Isn&apos;t that what people used to say &mdash; when everything&apos;s going well.</span></div>
<div class="speech"><span class="number">506</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">Oh, yes that rings a bell. Everything&apos;s coming up Millwall. Was that from a TV show or something?</span></div>
<div class="speech"><span class="number">507</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">I think so. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{an} is now laughing</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<div class="speech"><span class="number">508</span><span class="label char-c" data-char-key="c">{cn}:&nbsp;</span><span class="line char-c">What?</span></div>
<div class="speech"><span class="number">509</span><span class="label char-a" data-char-key="a">{an}:&nbsp;</span><span class="line char-a">Ah, it&apos;s close enough. We&apos;re bound to lose some things along the way. At least we&apos;ve got each other. And {dn}. And two more people! Maybe we will get through this.</span></div>
<div class="speech"><span class="number">510</span><span class="label char-b" data-char-key="b">{bn}:&nbsp;</span><span class="line char-b">I hope so. We&apos;ve still got to grow a few vegetables though. And we&apos;ll have to keep the chickens alive, maintain the greenhouses, keep trying to spread the greenery down the valley to try and lock more moisture into the land. Rehearse a play that some mad person thinks will keep our spirits up. And then it&apos;s just the simple matter of waiting for the climate to settle back down a bit and re&dash;populating the country with people and a solid culture of song, storytelling and questioning authority.</span></div>

<div class="speech"><h3 class="scene" style="grid-column:3">1.  Luck runs out</h3></div>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">The radio plays as the lights come up on {an} sitting at a laptop in a deckchair under a parasol. During this radio section, {bn} enters and touches {an} on the shoulder in a friendly way, {an} puts a hand up to briefly hold {ba}s. {bn} collects an implement and then exits back to the farm.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>

<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">A moment passes.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
