<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{an}, {bn} &amp; {cn} are now dead. The radio continues oblivious for a time and then fades out with the lights.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">512</span><span class="label char-f" data-char-key="f">{fn}:&nbsp;</span><span class="line char-f">...and it was great to hear from Isla there. Lots of useful tips on water preservation for everyone&apos;s most crucial activity. And tomorrow we&apos;re hoping to have Olivia here to talk about cooking. She&apos;s got a wonderful new recipe that my little Linda just goes crazy for, as well as some great suggestions on how to retain moisture in your food, while still making sure you&apos;ve cooked it enough to be digestible.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">Super important for us here as we recently hit the 10% threshold on our water reserves, and the river here is now dried up for the year, so we have to make what we have last. Everyone&apos;s holding out for that first rain, desperate to find out when we can loosen up the rationing. Some are starting to talk about prioritising some people over others but it&apos;s a contentious topic. Our weather experts are expecting rain any day now, but the council here are desperate to make sure we don&apos;t run out before it comes. They&apos;re considering a worst case scenario that it doesn&apos;t come until October, which would have been unthinkable a few years ago, but we just don&apos;t have the ability to predict the weather as accurately any more.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">Since we&apos;ve got back online we&apos;ve been back in touch with communities across Europe and I&apos;m afraid it&apos;s not looking much better on the continent. Down on the Mediterranean coast they&apos;ve not had the rains yet, and instead have been dealing with red dust clouds blowing over the sea from the Sahara and dropping sand all over their greenhouses. In one community they&apos;ve resorted to burning their firewood to distill freshwater from seawater. So we&apos;re not expecting any rain from the South in the next few days.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">And we&apos;ve no idea what&apos;s coming from the North, since Iceland dropped off last winter.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">To the East, my cousin Oscar in Berlin has been trying to collect data from across Europe and his best guess is that we&apos;ve lost seven communities to wild fires this summer, and another fifteen to drought, though many of those people have moved to other communities, so it&apos;s not as bad as it sounds. They&apos;ve had slightly cooler temperatures in Eastern Europe, two or three degrees below Western Europe, but still averaging slightly above last year. Obviously, since the Alpine glaciers all melted the rivers just can&apos;t keep up with the evaporation so it&apos;s been hard going on the continent, and they&apos;ve still no sign of rain yet.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">So, it&apos;s looking pretty bleak out there, but on the other hand it makes the decision to stay put easier. We&apos;ve still got a core group of about twelve looking to head down to Wiltshire and try their luck at the community there, including our pregnant resident Amelia, who&apos;s need for a doctor makes the trip all the more important.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">In more positive news, Sam has had some luck experimenting with capturing dew. She&apos;s rigged up some black sheeting out in the open that radiates heat at night and cools faster than the air, catching condensation and then funnelling it down into a container. She only got a few mouthfuls of water out of it, but at this point it feels like quite a significant win. I might try and get her on to talk about that soon.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">I think that about wraps it up for today&apos;s update, so I&apos;ll leave you with this... <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Music plays.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>

<div class="speech"><h3 class="scene" style="grid-column:3">3. Burial</h3></div>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Lights come up. {dn} enters alone with a gunshot wound to the leg. {dS} {dv:is|are} shocked at what {ds} {dv:sees|see}, but perhaps {dv:was|were} half expecting it. {dS} {dv:goes|go} over to {bn} and check that {bs} {bv:is|are} definitely dead. Then {ds} {dv:checks|check} {an} and {cn}.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{dn} sits for a moment in despair.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>

<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{dn} rises and limps off to the house, returning a moment later with bandages and water. {dS} {dv:removes|remove} the bloody strip of cloth tied around {da} leg, clean around the wound and then replace it with fresh bandages.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>

<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{dn} sits for a moment in despair.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>

<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{dn} rises and finds a shovel from among the things on stage. {dS} {dv:carries|carry} it offstage. {dS} {dv:returns|return} and {dv:begins|begin} to drag {bn}&apos;s body offstage. Lights down.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><h3 class="scene" style="grid-column:3">4. What now?</h3></div>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Lights up. {dn} comes on stage with a backpack, like at the start of the play. {dS} hardly {dv:limps|limp}. {dS} {dv:stands|stand} on the cusp of leaving. {dS} {dv:turns|turn} back to look at the farm. {dS} {dv:collapses|collapse} to the ground, clearly emotional. After a moment {ds} {dv:gets|get} back up, {dv:walks|walk} to a seat, {dv:removes|remove} the backpack and {dv:sits|sit} down.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{dn} sits for a moment in despair.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{dn} exits and returns with a portable games console, a tin of peaches and a canned drink. {dS} {dv:opens|open} the can and take a long drink from it. {dS} {dv:opens|open} the tin and {dv:eats|eat} a couple of peach slices. {dS} {dv:turns|turn} on the games console and a distinctive loading sound is heard.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Lights down.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><h3 class="scene" style="grid-column:3">5. Chekhov&apos;s Gun</h3></div>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Lights up. Radio plays, as {dn} sits playing games in the deckchair, surrounded by detritus.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">513</span><span class="label char-f" data-char-key="f">{fn}:&nbsp;</span><span class="line char-f">...and we&apos;re still extremely grateful for our shiny new satellite terminal. Our whole back catalog of podcasts are available again at pointhope.info. That&apos;s &quot;point hope dot info&quot;. Oh, it says here &apos;glances meaningfully at the audience&apos; &mdash; this is a voice over, how&apos;s that going to work?. I guess I&apos;ll just emphasise it with my voice. <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Meaningfully:</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> &quot;Point hope dot info&quot;.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">Anyway, our visitor who brought us the terminal wished to remain anonymous, {ds} seemed to be taking security very seriously, but we&apos;ve left it a few days, so {ds} should be home by now, and if you&apos;re listening, then thank you mystery stranger, and we hope you, your travelling companions and your community are enjoying the end of the summer.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">A crow flies into the scene and lands near the deckchair. It hops towards {dn}, investigating. {dn} pours out a little water into a lid and slides it towards the crow, who accepts it.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">Unfortunately, we&apos;ve not heard anything from Southern Europe in the last few days. The furthest South we&apos;ve had contact with is near Geneva, they seem to be doing better for water just on the North side of the Alps. Up by Berlin they&apos;re really struggling for water though.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">And here we&apos;re down to about 4%. We were as generous as we dared to be with the group that left for Wiltshire. It turned out that when Amelia left there were a surprising number of men who wanted to go with her. I gather it wasn&apos;t entirely clear who the father was. We had to limit the water we gave them for the journey though, and we all felt bad about it. I&apos;m sad to say it was probably the right call though. We&apos;ve since heard that they&apos;ve had some sort of altercation down in Wiltshire, a fight broke out and at least one person died from his wounds. They might survive as a community, but that kind of thing tends to be pretty catastrophic. Tensions must already have been running high there for that to happen, and then to deal with the fallout of an event like that, well, it doesn&apos;t bear thinking about.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">{dn} offers the crow a snack. The crow accepts it.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">When resources are scarce it puts a strain on everyone. Even when people mean well. Archie still feels terrible about the chickens, and there&apos;s definitely been some resentment here, but the council has been firm that we gain nothing by blaming him. We&apos;ve had some stubborn foxes snooping around and you can&apos;t keep watch when you&apos;re so fatigued from dehydration. We&apos;re lucky it was only foxes really, it could have been so much worse.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">All in all, we&apos;re trying to keep our spirits up as we wait for the rain. It will be such a relief when it comes.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Background sounds of gunshots. The crow flies away as {dn} looks up from {da} games console and stares at the radio.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Slight pause.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> It&apos;s been the longest summer and... <span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">More gunshots.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span> ...excuse me a moment, I think there&apos;s something going on here...</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Silence for a moment.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Background sounds of shouting, screaming and gunshots.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Silence for a moment. Lights go down</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><h3 class="scene" style="grid-column:3">6. A bigger story.</h3></div>
<br>
<div class="speech stage-direction"><span style="grid-column:3"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Lights up. {dn}&apos;s skeleton sits exactly where {ds} {dv:was|were} before, but now surrounded by more empty water containers, tins, etc. The radio is playing the end of a song.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span class="number">514</span><span class="label char-f" data-char-key="f">{fn}:&nbsp;</span><span class="line char-f">...and that was {finalTrackArtist} with &quot;{finalTrackTitle}&quot;. Just playing that to keep your spirits up. Obviously, everyone&apos;s dead now &mdash; including me &mdash; so I thought a little light entertainment was in order. It&apos;s remarkable how quickly things can fall apart really. Everything seems to be bumbling along and you accept it all as normal, as an unchangeable reality. And even as it shifts, year&dash;by&dash;year, you adjust to the new normal and come to think again that it cannot change. It seems unthinkable that it might end.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">And this is what it all comes down to.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">Billions of years to form a planet with just the right conditions, a sudden seed and a branching tree of life bursts into being. Stretching its tendrils out to fill the waters, to cover the land, to fill every niche with vibrancy, with variety. Until finally something so complex happens that it stands on its own two feet and names itself.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">It grows. It feeds. It spreads. It knows how to have a good time, to sing, to dance, to party. It tells itself stories about itself, about the past, about the future &mdash; about its hopes and dreams.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">But even as it dreams of travelling to other worlds &mdash; to set foot on other planets &mdash; even as these dreams finally come within reach it sows the seeds of its own destruction.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">The systems we built to feed us, to clothe us, to house us, to bend every resource to our whim gave us power we couldn&apos;t control. The biggest, most self aware, most powerful thing that&apos;s ever existed, already bulging with an embarrassment of capabilities, yet still ripe with more potential, desperate to keep growing but running out of things to consume.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">And this is what it all comes down to.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">Billions of people. Fighting for a better life. Fighting each other. A post&dash;scarcity world in which billions still fight to survive. A world dripping with power in which billions are powerless to shape their own lives. In which every struggle to have something for ourselves is framed as necessarily taking away from someone else. A zero&dash;sum game in which we somehow all lose.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">Maybe we could frame it a different way. Maybe we could fight together for the world that we want. Even now, it might not be too late to change course.</span></div>
<br>
<div class="speech"><h3 class="scene" style="grid-column:3">7. The End</h3></div>
<br>
<div class="speech"><span class="number">515</span><span class="label char-f" data-char-key="f">{fn}:&nbsp;</span><span class="line char-f">Even as you sit here, wondering what you&apos;re watching. It&apos;s not a play anymore. It&apos;s just a corpse listening to a radio. You paid to see a play. Perhaps a friend dragged you along. Maybe your partner got you a ticket. &quot;Come to the theatre!&quot; they said, &quot;It&apos;ll be fun!&quot;, they said. And here you are sitting in silence, listening to me droning on about an ongoing disaster that no one is doing enough to fix.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">This following final section plays in a loop continuously. The radio has a large switch on it. If anyone switches the radio off, it will remain off for a few seconds and then switch itself back on again in the manner of a &quot;Useless Box&quot;</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">So, what are you going to do?</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">All the characters are dead. There&apos;s nothing left for you here. You should go.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">What are you waiting for? No curtain is going to close. There&apos;s no more lighting cues. There&apos;s no bow coming &mdash; everyone&apos;s dead. No&dash;one&apos;s going to usher you out. You have to make that decision for yourself.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">All you have to do is get up &mdash; out of your seat. Turn the damn radio off, and walk out the door. No one is stopping you.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f">Honestly, it&apos;s just me talking in a loop until you make a decision.</span></div>
<br>
<div class="speech"><span></span><span></span><span class="line char-f"><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">[</span><span class="direction" style="background-color:#FFFFCC"><span class="direction-text">Radio loops back to previous direction above.</span></span><span class="brkt" style="font-size:0;background-color:#FFFFCC;color:#FFFFCC">]</span></span></div>
<br>

      h += '<label>Preset <select data-preset="' + k + '"><option>Preset\u2026</option>';
      presets.forEach(function(p) { h += '<option value="' + p.label + '">' + p.label + '</option>'; });
      h += '</select></label>';
      ['n','s','o','a','p','r'].forEach(function(f) {

      });
      h += '<label>Verb <select data-char="' + k + '" data-field="v">';

  function buildHighlightBar() {

    }
    highlightBar.innerHTML = h + '<select id="scene-jump"><option>Scene…</option></select>';

  function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  function render() {
    let out = template;
    for (const [k, v] of Object.entries(vars)) {
      out = out.replaceAll('{' + k + '}', v);
    }
    for (const [k, c] of Object.entries(chars)) {
      ['n','s','o','a','p','r'].forEach(function(f) {

      var verbRe = new RegExp('\\{' + k + "v:([a-z&;']+)\\|([a-z&;']+)\\}", 'g');

      document.querySelectorAll('.line.char-' + k).forEach(function(el) { el.style.backgroundColor = bg; });

      var ex = controlsEl.querySelector('[data-examples="' + k + '"]');
      if (ex) ex.innerHTML = exampleSentences(chars[k]);
    }
    // update label column width — size to longest word, not longest name
    var measure = document.getElementById('measure');

      measure.style.cssText = 'visibility:hidden;position:absolute;white-space:nowrap;font-weight:bold;';
      document.body.appendChild(measure);

    var maxW = 0;
    for (const [, c] of Object.entries(chars)) {

        }
      });

  }

    if (el.dataset.preset) {
      var p = presets.find(function(x) { return x.label === el.value; });
      if (p) {
        var c = chars[el.dataset.preset];
        ['s','o','a','p','r','v'].forEach(function(f) { c[f] = p[f]; });
        var card = el.closest('.char-card');
        ['s','o','a','p','r'].forEach(function(f) {
          var inp = card.querySelector('[data-field="' + f + '"]');
          if (inp) inp.value = c[f];
        });
        var vSel = card.querySelector('[data-field="v"]');
        if (vSel) vSel.value = c.v;
        render();
      }
    } else if (el.dataset.var) {
      vars[el.dataset.var] = el.value;
    } else if (el.dataset.char) {
      chars[el.dataset.char][el.dataset.field] = el.value;
    }
    render();
  });

  highlightBar.addEventListener('click', function(e) {
    var k = e.target.dataset.highlight;
    if (k) {
      highlight[k] = !highlight[k];
      render();
    } else if (e.target.hasAttribute('data-highlight-dir')) {
      highlightDirections = !highlightDirections;
      render();
    }
  });

  highlightBar.addEventListener('change', function(e) {
    if (e.target.id === 'scene-jump' && e.target.value !== 'Scene\u2026') {
      var scenes = contentEl.querySelectorAll('.scene');
      var scene = scenes[parseInt(e.target.value)];
      if (scene) scene.scrollIntoView({behavior: 'smooth'});
      e.target.selectedIndex = 0;
    }
  });
})();
</script>
</body>
</html>
